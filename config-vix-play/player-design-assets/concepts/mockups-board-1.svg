<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1450 820" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6D5BFF"/><stop offset="1" stop-color="#B24BFF"/></linearGradient>
    <linearGradient id="th1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1E3A5F"/><stop offset="1" stop-color="#2AA7B0"/></linearGradient>
    <linearGradient id="th2" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#5B2A6E"/><stop offset="1" stop-color="#C0466E"/></linearGradient>
    <linearGradient id="th3" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7A3B1E"/><stop offset="1" stop-color="#E0913D"/></linearGradient>
    <linearGradient id="th4" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#1E4D3A"/><stop offset="1" stop-color="#4F9E6E"/></linearGradient>
    <linearGradient id="scene" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#20243A"/><stop offset="0.6" stop-color="#3A2E5C"/><stop offset="1" stop-color="#191723"/></linearGradient>
    <linearGradient id="audiobg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#2A1E42"/><stop offset="1" stop-color="#101016"/></linearGradient>
    <linearGradient id="art" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8B5BFF"/><stop offset="1" stop-color="#FF5E9A"/></linearGradient>
    <clipPath id="cA"><rect x="0" y="0" width="300" height="670" rx="34"/></clipPath>
    <clipPath id="cB"><rect x="0" y="0" width="300" height="670" rx="34"/></clipPath>
    <clipPath id="cC"><rect x="0" y="0" width="300" height="670" rx="34"/></clipPath>
    <clipPath id="cD"><rect x="0" y="0" width="300" height="670" rx="34"/></clipPath>
  </defs>

  <rect width="1450" height="820" fill="#0A0B0E"/>
  <text x="40" y="46" fill="#F2F3F5" font-size="26" font-weight="700">App Design — Screen Mockups</text>
  <text x="40" y="70" fill="#8A8D98" font-size="14">Dark / AMOLED · indigo–violet accent · player-first layout</text>

  <!-- ============ PHONE A: HOME / VIDEO LIBRARY ============ -->
  <g transform="translate(40,92)">
    <rect width="320" height="700" rx="42" fill="#000" stroke="#23252F" stroke-width="2"/>
    <g transform="translate(10,15)" clip-path="url(#cA)">
      <rect width="300" height="670" fill="#121316"/>
      <!-- status bar -->
      <text x="20" y="26" fill="#E7E8EC" font-size="12" font-weight="600">9:41</text>
      <g transform="translate(258,17)" fill="#C9CBD3"><rect x="0" y="0" width="16" height="10" rx="2"/><rect x="20" y="2" width="14" height="8" rx="2"/></g>
      <!-- app bar -->
      <text x="20" y="66" fill="#F2F3F5" font-size="22" font-weight="700">Player</text>
      <circle cx="250" cy="58" r="4.5" fill="none" stroke="#C9CBD3" stroke-width="2"/><line x1="253" y1="61" x2="258" y2="66" stroke="#C9CBD3" stroke-width="2"/>
      <g fill="#C9CBD3"><circle cx="278" cy="52" r="2"/><circle cx="278" cy="58" r="2"/><circle cx="278" cy="64" r="2"/></g>
      <!-- continue watching -->
      <text x="20" y="98" fill="#C9CBD3" font-size="13" font-weight="600">Continue watching</text>
      <g transform="translate(20,108)">
        <rect width="160" height="92" rx="12" fill="url(#th1)"/>
        <rect x="0" y="84" width="112" height="4" rx="2" fill="url(#acc)"/>
        <rect x="0" y="84" width="160" height="4" rx="2" fill="#ffffff22"/>
        <rect x="0" y="84" width="112" height="4" rx="2" fill="url(#acc)"/>
        <rect x="120" y="8" width="34" height="16" rx="4" fill="#000000aa"/><text x="137" y="20" fill="#fff" font-size="9" text-anchor="middle">48:12</text>
        <polygon points="70,38 70,58 88,48" fill="#ffffffcc"/>
      </g>
      <g transform="translate(190,108)">
        <rect width="160" height="92" rx="12" fill="url(#th2)"/>
        <rect x="0" y="84" width="60" height="4" rx="2" fill="#ffffff22"/><rect x="0" y="84" width="60" height="4" rx="2" fill="url(#acc)"/>
      </g>
      <text x="20" y="220" fill="#EDEEF0" font-size="11">Interstellar</text>
      <!-- all videos -->
      <text x="20" y="250" fill="#C9CBD3" font-size="13" font-weight="600">All videos</text>
      <g transform="translate(210,240)" fill="#8A8D98"><rect x="0" y="0" width="26" height="12" rx="6" fill="#22242C"/><text x="13" y="9" fill="#A0A3AD" font-size="8" text-anchor="middle">Grid</text></g>
      <!-- grid -->
      <g transform="translate(20,262)">
        <rect width="128" height="80" rx="10" fill="url(#th3)"/><text x="6" y="98" fill="#D7D9DF" font-size="10">Dune Part Two</text><text x="6" y="112" fill="#7E818C" font-size="8">2h 46m</text>
        <g transform="translate(142,0)"><rect width="128" height="80" rx="10" fill="url(#th4)"/><text x="6" y="98" fill="#D7D9DF" font-size="10">The Bear S03</text><text x="6" y="112" fill="#7E818C" font-size="8">28m</text></g>
        <g transform="translate(0,122)"><rect width="128" height="80" rx="10" fill="url(#th2)"/><text x="6" y="98" fill="#D7D9DF" font-size="10">Oppenheimer</text><text x="6" y="112" fill="#7E818C" font-size="8">3h 00m</text></g>
        <g transform="translate(142,122)"><rect width="128" height="80" rx="10" fill="url(#th1)"/><text x="6" y="98" fill="#D7D9DF" font-size="10">Blade Runner</text><text x="6" y="112" fill="#7E818C" font-size="8">2h 44m</text></g>
      </g>
      <!-- bottom nav -->
      <rect x="0" y="612" width="300" height="58" fill="#16171C"/>
      <g text-anchor="middle" font-size="9">
        <g transform="translate(45,628)"><rect x="-7" y="-2" width="14" height="12" rx="2" fill="url(#acc)"/><text y="24" fill="#B39BFF">Video</text></g>
        <g transform="translate(115,628)" fill="#7E818C"><circle cx="0" cy="4" r="6" fill="none" stroke="#7E818C" stroke-width="2"/><text y="24">Audio</text></g>
        <g transform="translate(185,628)" fill="#7E818C"><path d="M-7,8 A9 9 0 0 1 7,8" fill="none" stroke="#7E818C" stroke-width="2"/><circle cx="0" cy="8" r="1.6"/><text y="24">Network</text></g>
        <g transform="translate(255,628)" fill="#7E818C"><circle cx="0" cy="4" r="6" fill="none" stroke="#7E818C" stroke-width="2"/><text y="24">Settings</text></g>
      </g>
      <rect x="120" y="7" width="60" height="9" rx="4.5" fill="#000"/>
    </g>
    <text x="160" y="726" fill="#9A9DA8" font-size="13" text-anchor="middle" font-weight="600">Home · Video Library</text>
  </g>

  <!-- ============ PHONE B: VIDEO PLAYER ============ -->
  <g transform="translate(390,92)">
    <rect width="320" height="700" rx="42" fill="#000" stroke="#23252F" stroke-width="2"/>
    <g transform="translate(10,15)" clip-path="url(#cB)">
      <rect width="300" height="670" fill="url(#scene)"/>
      <!-- faux scene shapes -->
      <circle cx="220" cy="150" r="46" fill="#ffffff10"/>
      <polygon points="0,540 90,400 170,540" fill="#00000030"/><polygon points="120,540 210,420 300,540" fill="#00000040"/>
      <!-- top scrim + bar -->
      <rect width="300" height="90" fill="#00000066"/>
      <path d="M22,40 l-10,8 l10,8" fill="none" stroke="#fff" stroke-width="2"/>
      <text x="40" y="52" fill="#fff" font-size="12" font-weight="600">Interstellar.2014.mkv</text>
      <g fill="#fff"><path d="M250,44 h16 v12 h-16 z" fill="none" stroke="#fff" stroke-width="2"/><circle cx="284" cy="44" r="2"/><circle cx="284" cy="50" r="2"/><circle cx="284" cy="56" r="2"/></g>
      <!-- gesture HUD: precision seek preview -->
      <g transform="translate(88,250)">
        <rect x="-8" y="-8" width="140" height="118" rx="14" fill="#000000cc"/>
        <rect x="2" y="2" width="120" height="68" rx="8" fill="url(#th1)"/>
        <polygon points="55,26 55,46 72,36" fill="#ffffffcc"/>
        <text x="62" y="90" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">-01:23</text>
        <text x="62" y="104" fill="#B39BFF" font-size="9" text-anchor="middle">Fine seek</text>
      </g>
      <!-- bottom scrim + controls -->
      <rect x="0" y="520" width="300" height="150" fill="#00000088"/>
      <!-- scrubber -->
      <rect x="20" y="560" width="260" height="4" rx="2" fill="#ffffff33"/>
      <rect x="20" y="560" width="150" height="4" rx="2" fill="#ffffff55"/>
      <rect x="20" y="560" width="120" height="4" rx="2" fill="url(#acc)"/>
      <circle cx="140" cy="562" r="7" fill="#fff"/>
      <text x="20" y="582" fill="#D7D9DF" font-size="9">42:15</text><text x="280" y="582" fill="#D7D9DF" font-size="9" text-anchor="end">2:49:00</text>
      <!-- control row -->
      <g transform="translate(0,610)" fill="#fff">
        <circle cx="150" cy="10" r="22" fill="url(#acc)"/><rect x="143" y="1" width="5" height="18" rx="1"/><rect x="152" y="1" width="5" height="18" rx="1"/>
        <path d="M92,2 l0,16 l-14,-8 z" fill="#fff"/><path d="M78,2 l0,16" stroke="#fff" stroke-width="2"/>
        <path d="M208,2 l0,16 l14,-8 z"/><path d="M222,2 l0,16" stroke="#fff" stroke-width="2"/>
        <text x="34" y="14" font-size="11" font-weight="600">1×</text>
        <rect x="250" y="2" width="20" height="14" rx="3" fill="none" stroke="#fff" stroke-width="1.6"/><text x="260" y="13" font-size="7" text-anchor="middle">CC</text>
      </g>
    </g>
    <text x="160" y="726" fill="#9A9DA8" font-size="13" text-anchor="middle" font-weight="600">Video Player · precision seek</text>
  </g>

  <!-- ============ PHONE C: AUDIO PLAYER ============ -->
  <g transform="translate(740,92)">
    <rect width="320" height="700" rx="42" fill="#000" stroke="#23252F" stroke-width="2"/>
    <g transform="translate(10,15)" clip-path="url(#cC)">
      <rect width="300" height="670" fill="url(#audiobg)"/>
      <text x="20" y="26" fill="#E7E8EC" font-size="12" font-weight="600">9:41</text>
      <!-- header -->
      <path d="M28,52 l10,10 l10,-10" fill="none" stroke="#D7D9DF" stroke-width="2"/>
      <text x="150" y="56" fill="#C9CBD3" font-size="11" text-anchor="middle" font-weight="600">NOW PLAYING</text>
      <g fill="#C9CBD3"><circle cx="270" cy="46" r="2"/><circle cx="270" cy="52" r="2"/><circle cx="270" cy="58" r="2"/></g>
      <!-- album art -->
      <rect x="55" y="90" width="190" height="190" rx="20" fill="url(#art)"/>
      <circle cx="150" cy="185" r="34" fill="#ffffff22"/><circle cx="150" cy="185" r="10" fill="#ffffff44"/>
      <!-- title -->
      <text x="30" y="326" fill="#F2F3F5" font-size="19" font-weight="700">Midnight City</text>
      <text x="30" y="348" fill="#A0A3AD" font-size="13">M83 · Hurry Up, We're Dreaming</text>
      <circle cx="270" cy="320" r="9" fill="none" stroke="#8A8D98" stroke-width="2"/><path d="M266,320 a4,4 0 0 1 8,0" fill="#B24BFF"/>
      <!-- seek -->
      <rect x="30" y="382" width="240" height="4" rx="2" fill="#ffffff22"/><rect x="30" y="382" width="140" height="4" rx="2" fill="url(#acc)"/><circle cx="170" cy="384" r="6" fill="#fff"/>
      <text x="30" y="404" fill="#8A8D98" font-size="9">2:14</text><text x="270" y="404" fill="#8A8D98" font-size="9" text-anchor="end">4:03</text>
      <!-- transport -->
      <g transform="translate(0,450)" fill="#F2F3F5">
        <path d="M40,0 l0,20 M40,10 l14,-10 l0,20 z" stroke="#C9CBD3" stroke-width="2" fill="none"/>
        <path d="M92,-2 l0,24 l-16,-12 z"/><rect x="72" y="-2" width="3" height="24"/>
        <circle cx="150" cy="10" r="30" fill="url(#acc)"/><rect x="143" y="-1" width="5" height="22" rx="1" fill="#fff"/><rect x="152" y="-1" width="5" height="22" rx="1" fill="#fff"/>
        <path d="M208,-2 l0,24 l16,-12 z"/><rect x="225" y="-2" width="3" height="24"/>
        <path d="M262,0 a10 10 0 1 1 -6,-3" fill="none" stroke="#C9CBD3" stroke-width="2"/>
      </g>
      <!-- bottom actions -->
      <g transform="translate(0,560)" text-anchor="middle" font-size="9" fill="#9A9DA8">
        <g transform="translate(60,0)"><rect x="-9" y="-2" width="18" height="12" rx="2" fill="none" stroke="#9A9DA8" stroke-width="1.6"/><text y="26">Equalizer</text></g>
        <g transform="translate(120,0)"><circle cx="0" cy="4" r="7" fill="none" stroke="#9A9DA8" stroke-width="1.6"/><text y="26">Timer</text></g>
        <g transform="translate(180,0)"><rect x="-8" y="-1" width="16" height="3" fill="#9A9DA8"/><rect x="-8" y="4" width="16" height="3" fill="#9A9DA8"/><text y="26">Queue</text></g>
        <g transform="translate(240,0)"><path d="M0,8 l-6,-6 a3.5 3.5 0 0 1 6,-1 a3.5 3.5 0 0 1 6,1 z" fill="#9A9DA8"/><text y="26">Favorite</text></g>
      </g>
      <rect x="120" y="7" width="60" height="9" rx="4.5" fill="#000"/>
    </g>
    <text x="160" y="726" fill="#9A9DA8" font-size="13" text-anchor="middle" font-weight="600">Audio Player</text>
  </g>

  <!-- ============ PHONE D: GESTURE SETTINGS ============ -->
  <g transform="translate(1090,92)">
    <rect width="320" height="700" rx="42" fill="#000" stroke="#23252F" stroke-width="2"/>
    <g transform="translate(10,15)" clip-path="url(#cD)">
      <rect width="300" height="670" fill="#121316"/>
      <text x="20" y="26" fill="#E7E8EC" font-size="12" font-weight="600">9:41</text>
      <path d="M22,54 l-10,8 l10,8" fill="none" stroke="#fff" stroke-width="2"/>
      <text x="42" y="66" fill="#F2F3F5" font-size="19" font-weight="700">Gestures</text>
      <text x="20" y="98" fill="#8A8D98" font-size="11">Tap a zone to change what its gestures do.</text>
      <!-- zone grid -->
      <g transform="translate(20,112)">
        <rect width="260" height="146" rx="12" fill="#1C1D22"/>
        <g stroke="#0E0F13" stroke-width="2">
          <line x1="86.6" y1="0" x2="86.6" y2="146"/><line x1="173.3" y1="0" x2="173.3" y2="146"/>
          <line x1="0" y1="48.6" x2="260" y2="48.6"/><line x1="0" y1="97.3" x2="260" y2="97.3"/>
        </g>
        <rect x="1" y="49" width="85" height="47" rx="4" fill="#6D5BFF33" stroke="url(#acc)" stroke-width="2"/>
        <text x="43" y="76" fill="#B39BFF" font-size="8" text-anchor="middle">MID LEFT</text>
        <text x="130" y="27" fill="#5D606B" font-size="7" text-anchor="middle">TOP</text>
        <text x="216" y="76" fill="#5D606B" font-size="7" text-anchor="middle">MID RIGHT</text>
        <text x="130" y="125" fill="#5D606B" font-size="7" text-anchor="middle">BOTTOM</text>
      </g>
      <!-- bindings list -->
      <g transform="translate(20,278)">
        <rect width="260" height="52" rx="10" fill="#1C1D22"/>
        <text x="14" y="24" fill="#F2F3F5" font-size="12" font-weight="600">Brightness</text>
        <text x="14" y="40" fill="#7E818C" font-size="9">Left half · Swipe vertical</text>
        <g transform="translate(70,278)"></g>
        <g transform="translate(0,62)"><rect width="260" height="52" rx="10" fill="#1C1D22"/><text x="14" y="24" fill="#F2F3F5" font-size="12" font-weight="600">Seek precise</text><text x="14" y="40" fill="#7E818C" font-size="9">Any · Swipe horizontal</text></g>
        <g transform="translate(0,124)"><rect width="260" height="52" rx="10" fill="#1C1D22"/><text x="14" y="24" fill="#F2F3F5" font-size="12" font-weight="600">Speed hold</text><text x="14" y="40" fill="#7E818C" font-size="9">Any · Long-press drag</text></g>
        <g transform="translate(0,186)"><rect width="260" height="52" rx="10" fill="#1C1D22"/><text x="14" y="24" fill="#F2F3F5" font-size="12" font-weight="600">Play / pause</text><text x="14" y="40" fill="#7E818C" font-size="9">Center · Double tap</text></g>
      </g>
      <rect x="120" y="7" width="60" height="9" rx="4.5" fill="#000"/>
    </g>
    <text x="160" y="726" fill="#9A9DA8" font-size="13" text-anchor="middle" font-weight="600">Settings · Gesture remap</text>
  </g>
</svg>
