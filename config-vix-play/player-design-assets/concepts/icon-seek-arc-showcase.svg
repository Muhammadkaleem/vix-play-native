<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 640" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <linearGradient id="v" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6D5BFF"/>
      <stop offset="1" stop-color="#B24BFF"/>
    </linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- reusable icon art in a 200 box -->
    <g id="art">
      <circle cx="100" cy="100" r="70" fill="none" stroke="#FFFFFF" stroke-opacity="0.92"
              stroke-width="13" stroke-linecap="round"
              stroke-dasharray="300 140" transform="rotate(128 100 100)"/>
      <circle cx="100" cy="30" r="11" fill="#FFFFFF"/>
      <path d="M78,66 L78,134 L138,100 Z" fill="#fff" stroke="#fff" stroke-width="14" stroke-linejoin="round"/>
    </g>
    <g id="artMono">
      <circle cx="100" cy="100" r="70" fill="none" stroke="#000" stroke-width="13" stroke-linecap="round"
              stroke-dasharray="300 140" transform="rotate(128 100 100)"/>
      <circle cx="100" cy="30" r="11" fill="#000"/>
      <path d="M78,66 L78,134 L138,100 Z" fill="#000" stroke="#000" stroke-width="14" stroke-linejoin="round"/>
    </g>
  </defs>

  <rect width="1000" height="640" fill="#0C0D11"/>
  <text x="60" y="58" fill="#F2F3F5" font-size="28" font-weight="700">Seek Arc — full spec</text>
  <text x="60" y="86" fill="#8A8D98" font-size="15">One mark, every surface: adaptive masks · themed monochrome · light &amp; dark · on device</text>

  <!-- Hero icon -->
  <g transform="translate(60,130)" filter="url(#s)">
    <rect width="280" height="280" rx="64" fill="url(#v)"/>
    <g transform="translate(40,40) scale(1)">
      <g transform="scale(1)">
        <use href="#art" transform="scale(1)"/>
      </g>
    </g>
  </g>
  <text x="200" y="450" fill="#7E818C" font-size="13" text-anchor="middle">Master · 512×512 · squircle</text>

  <!-- Adaptive masks -->
  <text x="420" y="150" fill="#B9BCC6" font-size="14" font-weight="600">Adaptive-icon masks (same layers, launcher decides shape)</text>
  <!-- circle -->
  <g transform="translate(420,170)">
    <clipPath id="cCircle"><circle cx="70" cy="70" r="70"/></clipPath>
    <g clip-path="url(#cCircle)">
      <rect width="140" height="140" fill="url(#v)"/>
      <use href="#art" transform="translate(-30,-30) scale(1)"/>
    </g>
  </g>
  <text x="490" y="330" fill="#7E818C" font-size="12" text-anchor="middle">Circle</text>
  <!-- squircle -->
  <g transform="translate(600,170)">
    <clipPath id="cSq"><rect width="140" height="140" rx="40"/></clipPath>
    <g clip-path="url(#cSq)">
      <rect width="140" height="140" fill="url(#v)"/>
      <use href="#art" transform="translate(-30,-30)"/>
    </g>
  </g>
  <text x="670" y="330" fill="#7E818C" font-size="12" text-anchor="middle">Squircle</text>
  <!-- rounded square -->
  <g transform="translate(780,170)">
    <clipPath id="cRr"><rect width="140" height="140" rx="22"/></clipPath>
    <g clip-path="url(#cRr)">
      <rect width="140" height="140" fill="url(#v)"/>
      <use href="#art" transform="translate(-30,-30)"/>
    </g>
  </g>
  <text x="850" y="330" fill="#7E818C" font-size="12" text-anchor="middle">Rounded sq.</text>

  <!-- Themed / monochrome + light -->
  <text x="420" y="380" fill="#B9BCC6" font-size="14" font-weight="600">Themed (Material You) &amp; light</text>
  <!-- monochrome on tinted (themed icon) -->
  <g transform="translate(420,398)">
    <rect width="120" height="120" rx="34" fill="#C9C4E8"/>
    <use href="#artMono" transform="translate(-40,-40) scale(1)"/>
  </g>
  <text x="480" y="540" fill="#7E818C" font-size="12" text-anchor="middle">Monochrome</text>
  <!-- light bg version -->
  <g transform="translate(560,398)">
    <rect width="120" height="120" rx="34" fill="#F2F3F5"/>
    <g transform="translate(-40,-40)">
      <circle cx="100" cy="100" r="70" fill="none" stroke="url(#v)" stroke-width="13" stroke-linecap="round" stroke-dasharray="300 140" transform="rotate(128 100 100)"/>
      <circle cx="100" cy="30" r="11" fill="url(#v)"/>
      <path d="M78,66 L78,134 L138,100 Z" fill="url(#v)"/>
    </g>
  </g>
  <text x="620" y="540" fill="#7E818C" font-size="12" text-anchor="middle">Light</text>

  <!-- home screen context -->
  <g transform="translate(720,398)">
    <rect width="220" height="150" rx="20" fill="#191A22"/>
    <!-- our icon -->
    <g transform="translate(24,20)">
      <rect width="52" height="52" rx="15" fill="url(#v)"/>
      <use href="#art" transform="translate(-52.5,-52.5) scale(0.525)"/>
    </g>
    <text x="50" y="92" fill="#C9CBD3" font-size="10" text-anchor="middle">Player</text>
    <!-- neighbor placeholders -->
    <rect x="92" y="20" width="52" height="52" rx="15" fill="#2C2E38"/>
    <rect x="160" y="20" width="52" height="52" rx="15" fill="#2C2E38"/>
    <rect x="24" y="100" width="52" height="52" rx="15" fill="#2C2E38"/>
    <rect x="92" y="100" width="52" height="52" rx="15" fill="#2C2E38"/>
    <rect x="160" y="100" width="52" height="52" rx="15" fill="#2C2E38"/>
  </g>
  <text x="830" y="568" fill="#7E818C" font-size="12" text-anchor="middle">On home screen</text>
</svg>
