<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 430" font-family="Inter, system-ui, sans-serif">
  <defs><linearGradient id="brand" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#6D5BFF"/><stop offset="1" stop-color="#B24BFF"/></linearGradient></defs>
  <rect width="720" height="430" fill="#0E0F13"/>
  <text x="30" y="42" fill="#F2F3F5" font-size="22" font-weight="700">Color Theme</text>
  <text x="30" y="66" fill="#8A8D98" font-size="13">Indigo–violet identity · Dark / AMOLED / Light</text>

  <rect x="30" y="86" width="300" height="46" rx="10" fill="url(#brand)"/>
  <text x="42" y="114" fill="#fff" font-size="13" font-weight="600">Brand gradient  #6D5BFF → #B24BFF</text>

  <!-- dark row -->
  <text x="30" y="160" fill="#C9CBD3" font-size="13" font-weight="600">Dark</text>
  <g transform="translate(30,170)">
    <g><rect width="80" height="56" rx="8" fill="#121316" stroke="#2A2C36"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">bg</text></g>
    <g transform="translate(90,0)"><rect width="80" height="56" rx="8" fill="#16171C"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">surface</text></g>
    <g transform="translate(180,0)"><rect width="80" height="56" rx="8" fill="#1C1D22"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">sheet</text></g>
    <g transform="translate(270,0)"><rect width="80" height="56" rx="8" fill="#8B5BFF"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">accent</text></g>
    <g transform="translate(360,0)"><rect width="80" height="56" rx="8" fill="#F2F3F5"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">content</text></g>
    <g transform="translate(450,0)"><rect width="80" height="56" rx="8" fill="#A0A3AD"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">secondary</text></g>
  </g>

  <!-- amoled row -->
  <text x="30" y="270" fill="#C9CBD3" font-size="13" font-weight="600">AMOLED</text>
  <g transform="translate(30,280)">
    <g><rect width="80" height="56" rx="8" fill="#000000" stroke="#222"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">bg</text></g>
    <g transform="translate(90,0)"><rect width="80" height="56" rx="8" fill="#0A0A0A"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">sheet</text></g>
    <g transform="translate(180,0)"><rect width="80" height="56" rx="8" fill="#8B5BFF"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">accent</text></g>
  </g>

  <!-- light row -->
  <text x="380" y="270" fill="#C9CBD3" font-size="13" font-weight="600">Light</text>
  <g transform="translate(380,280)">
    <g><rect width="80" height="56" rx="8" fill="#F7F7F8"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">bg</text></g>
    <g transform="translate(90,0)"><rect width="80" height="56" rx="8" fill="#FFFFFF"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">surface</text></g>
    <g transform="translate(180,0)"><rect width="80" height="56" rx="8" fill="#7A4BFF"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">accent</text></g>
    <g transform="translate(270,0)"><rect width="80" height="56" rx="8" fill="#14151A"/><text x="40" y="72" fill="#9A9DA8" font-size="9" text-anchor="middle">content</text></g>
  </g>

  <!-- state -->
  <g transform="translate(30,388)">
    <circle cx="8" cy="8" r="8" fill="#3FBE72"/><text x="24" y="12" fill="#9A9DA8" font-size="10">success</text>
    <circle cx="108" cy="8" r="8" fill="#F0B455"/><text x="124" y="12" fill="#9A9DA8" font-size="10">warning</text>
    <circle cx="208" cy="8" r="8" fill="#FF6369"/><text x="224" y="12" fill="#9A9DA8" font-size="10">error</text>
  </g>
</svg>
