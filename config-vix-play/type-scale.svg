<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" font-family="Inter, system-ui, sans-serif">
  <rect width="720" height="560" fill="#0E0F13"/>
  <text x="30" y="42" fill="#F2F3F5" font-size="22" font-weight="700">Typography — Inter + JetBrains Mono</text>
  <text x="30" y="66" fill="#8A8D98" font-size="13">Hierarchy from size &amp; weight, not extra fonts</text>

  <g fill="#F2F3F5">
    <text x="30" y="118" font-size="28" font-weight="700">Display · 28 Bold</text>
    <text x="30" y="160" font-size="22" font-weight="700">Headline · 22 Bold — screen title</text>
    <text x="30" y="198" font-size="16" font-weight="600">Title · 16 Semibold — section header</text>
    <text x="30" y="232" font-size="14" font-weight="600">Title small · 14 Semibold — card title</text>
    <text x="30" y="266" font-size="15" font-weight="400">Body large · 15 Regular — primary reading text</text>
    <text x="30" y="298" font-size="14" font-weight="400" fill="#D7D9DF">Body · 14 Regular — default description text</text>
  </g>
  <text x="30" y="330" font-size="12" fill="#A0A3AD">Body small · 12 · metadata: 2h 49m · 12.4 GB · /Movies/Nolan</text>
  <g>
    <rect x="30" y="348" width="120" height="30" rx="15" fill="#8B5BFF"/>
    <text x="90" y="368" font-size="14" font-weight="500" fill="#fff" text-anchor="middle">Label · 14 Medium</text>
    <text x="30" y="404" font-size="11" font-weight="500" fill="#B39BFF">LABEL SMALL · 11 · nav &amp; badges</text>
  </g>

  <rect x="30" y="424" width="660" height="1" fill="#26282F"/>
  <text x="30" y="456" fill="#C9CBD3" font-size="13" font-weight="600">Timecode (monospace) — digits stay aligned</text>
  <text x="30" y="500" font-family="'JetBrains Mono', monospace" font-size="26" fill="#F2F3F5">00:42:15 / 02:49:00</text>
  <text x="360" y="500" font-family="'JetBrains Mono', monospace" font-size="26" fill="#B39BFF">-01:23</text>
</svg>
